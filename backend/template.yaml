AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: App Compras - Smart Shopping List Backend

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref MainTable
        STAGE: !Ref Stage
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Resources:

  # ─── DynamoDB ─────────────────────────────────────────────────────────────────
  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "app-compras-${Stage}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # ─── Cognito ──────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "app-compras-${Stage}"
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireNumbers: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "app-compras-client-${Stage}"
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ─── API Gateway ──────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "app-compras-api-${Stage}"
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  # ─── Lambda Functions ─────────────────────────────────────────────────────────
  IngestItemFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [index.ts]
        Bundle: true
        Minify: false
        SourceMap: true
        External: ["@aws-sdk/*"]
    Properties:
      FunctionName: !Sub "app-compras-ingest-item-${Stage}"
      CodeUri: functions/ingest-item/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /items
            Method: POST

  GetMonthlyListFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [index.ts]
        Bundle: true
        Minify: false
        SourceMap: true
        External: ["@aws-sdk/*"]
    Properties:
      FunctionName: !Sub "app-compras-get-monthly-list-${Stage}"
      CodeUri: functions/get-monthly-list/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MainTable
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /list/{yearMonth}
            Method: GET

  ClosePurchaseFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [index.ts]
        Bundle: true
        Minify: false
        SourceMap: true
        External: ["@aws-sdk/*"]
    Properties:
      FunctionName: !Sub "app-compras-close-purchase-${Stage}"
      CodeUri: functions/close-purchase/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /list/{yearMonth}/close
            Method: POST

  ManageCatalogFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [index.ts]
        Bundle: true
        Minify: false
        SourceMap: true
        External: ["@aws-sdk/*"]
    Properties:
      FunctionName: !Sub "app-compras-manage-catalog-${Stage}"
      CodeUri: functions/manage-catalog/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /catalog
            Method: GET
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /catalog
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref MainTable
